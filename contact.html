<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Wall Puncher Central</title>
    <style>
        :root {
            --dark-red: #8B0000;
            --pink: #FF69B4;
            --bg-dark: #1a1a1a;
            --text-light: #ffffff;
            --card-bg: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            padding-top: 60px;
        }

        .navbar {
            background: linear-gradient(45deg, var(--dark-red), var(--pink));
            padding: 1rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .contact-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin: 2rem 0;
            background: linear-gradient(45deg, var(--dark-red), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .contact-form {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 10px;
            margin: 2rem 0;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--pink);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--dark-red);
            border-radius: 5px;
            color: var(--text-light);
            font-size: 1rem;
        }

        .form-group textarea {
            height: 150px;
            resize: vertical;
        }

        .submit-btn {
            background: linear-gradient(45deg, var(--dark-red), var(--pink));
            color: var(--text-light);
            padding: 1rem 2rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
        }



        @media (max-width: 768px) {
            .nav-links {
                flex-direction: column;
                align-items: center;
                padding: 1rem 0;
            }

            .contact-form {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem('authenticated') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="games.html">Games</a></li>
            <li><a href="minecraft.html">Minecraft</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="contact-container">
        <h1 class="section-title">Contact Us</h1>
        
        <form class="contact-form" id="contactForm" onsubmit="submitForm(event)">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" required>
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required placeholder="Type your message here..."></textarea>
            </div>
            
            <button type="submit" class="submit-btn">Open Email Client</button>
            <div id="formStatus" style="margin-top: 1rem; text-align: center;"></div>
        </form>

        <script>
            function submitForm(event) {
                event.preventDefault();
                const form = document.getElementById('contactForm');
                const formStatus = document.getElementById('formStatus');
                const name = document.getElementById('name').value;
                const subject = document.getElementById('subject').value;
                const message = document.getElementById('message').value;

                const mailtoLink = `mailto:wallpunchercentral@outlook.com?subject=${encodeURIComponent(subject)}&body=From: ${encodeURIComponent(name)}%0A%0A${encodeURIComponent(message)}`;
                window.location.href = mailtoLink;

                formStatus.style.color = 'var(--pink)';
                formStatus.textContent = 'Opening your email client...';
                form.reset();
            }
        </script>


    </div>
</body>
</html>
