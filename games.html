<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games | Wall Puncher Central</title>
    <style>
        :root {
            --dark-purple: #4B0082;
            --light-purple: #9370DB;
            --bg-dark: #1a1a1a;
            --text-light: #ffffff;
            --card-bg: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            padding-top: 60px;
        }

        .navbar {
            background: linear-gradient(45deg, var(--dark-purple), var(--light-purple));
            padding: 1rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .games-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            padding: 2rem 0;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .game-card:hover {
            transform: translateY(-10px);
        }

        .game-image {
            width: 100%;
            height: 150px;
            background: linear-gradient(45deg, var(--dark-purple), var(--light-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .game-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
            padding: 10px;
        }

        .game-image .fallback-text {
            color: var(--text-light);
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            z-index: 1;
        }

        .game-content {
            padding: 1.5rem;
        }

        .game-title {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--light-purple);
        }

        .game-description {
            font-size: 0.9rem;
            color: #ccc;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin: 2rem 0;
            background: linear-gradient(45deg, var(--dark-purple), var(--light-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (max-width: 768px) {
            .nav-links {
                flex-direction: column;
                align-items: center;
                padding: 1rem 0;
            }

            .games-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
        }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem('authenticated') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <nav class="navbar">

            <li><a href="minecraft.html">Minecraft</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

            },
            {

                description: 'Izak needs a better hairline :sob::pray:',
                link: '#game4-link',
                imagePath: 'games_titlecards/game4.jpg'
            }
        ];

        // Function to check if an image exists
        function imageExists(imagePath) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = imagePath;
            });
        }

        // Function to create game cards
        async function createGameCards() {
            const gamesGrid = document.querySelector('.games-grid');
            gamesGrid.innerHTML = '';

            for (const game of games) {
                const hasImage = await imageExists(game.imagePath);
                const gameCard = document.createElement('a');
                gameCard.href = game.link;
                gameCard.className = 'game-card';
                
                gameCard.innerHTML = `
                    <div class="game-image">
                        ${hasImage 
                            ? `<img src="${game.imagePath}" alt="${game.title}">` 
                            : `<div class="fallback-text">${game.title}</div>`
                        }
                    </div>
                    <div class="game-content">
                        <h3 class="game-title">${game.title}</h3>
                        <p class="game-description">${game.description}</p>
                    </div>
                `;

                gamesGrid.appendChild(gameCard);
            }
        }

        // Initialize the game cards when the page loads
        window.addEventListener('load', createGameCards);
    </script>

    <div class="games-container">

</body>
